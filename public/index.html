<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Level Academy</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; background:#eef1f7; color:#333; }
  #loginPage {
    height:100vh; display:flex; justify-content:center; align-items:center;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                url('https://i.postimg.cc/jd0ZRMCV/next-level.jpg') center/cover no-repeat;
    color:white;
  }
  .login-box {
    background:rgba(255,255,255,0.92); color:#111; padding:50px 40px; border-radius:16px;
    text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.4); backdrop-filter:blur(6px);
    max-width:380px; width:90%;
  }
  .login-box h2 { margin-bottom:30px; color:#2c3ea8; }
  .login-box input, .login-box select {
    padding:14px; margin:14px 0; width:100%; max-width:280px;
    border:1px solid #aaa; border-radius:8px; font-size:16px; box-sizing:border-box;
  }
  .signup-link { margin-top:15px; color:#2c3ea8; cursor:pointer; text-decoration:underline; }

  #platform { padding:30px; }
  #classroom { display:none; padding:30px; background:#f8f9fc; }
  #participants { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin:25px 0; }
  .participant-wrapper { width:280px; text-align:center; background:#fff; border-radius:12px; padding:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .participant-video { width:100%; border-radius:8px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Next Level Academy</h2>
    <input type="text" id="username" placeholder="Username"><br><br>
    <select id="role">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select><br><br>
    <button onclick="login()">Login</button>
    <div class="signup-link" onclick="showSignup()">Don't have an account? Sign Up</div>
  </div>
</div>

<!-- PLATFORM -->
<div id="platform" style="display:none">
  <h1>Welcome, <span id="welcomeName"></span></h1>

  <div id="teacherControls" style="display:none;">
    <h3>Start a Lesson</h3>
    <input type="text" id="lessonTitle" placeholder="Lesson Title (e.g. Math Grade 7)">
    <button onclick="startLesson()">Start Lesson</button>
  </div>

  <h2>Ongoing Classes</h2>
  <div id="ongoingGrid"></div>
</div>

<!-- CLASSROOM -->
<div id="classroom">
  <h2 id="roomTitle">Live Classroom</h2>
  <div id="participants"></div>

  <div style="margin:20px 0;">
    <button onclick="startCamera()">Start My Camera</button>
    <button onclick="shareScreen()">Share Screen</button>
    <button onclick="raiseHand()">Raise Hand ✋</button>
    <button id="exitBtn" onclick="exitClass()">Leave Class</button>
  </div>

  <div id="chat">
    <div id="messages" style="height:200px; overflow-y:auto; border:1px solid #ccc; padding:10px; background:white;"></div>
    <input id="chatInput" placeholder="Type message..." style="width:70%; padding:10px;">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>

<script>
  const socket = io();   // Change to your exact backend URL if needed: io('https://your-backend.onrender.com')

  let role = "", username = "", roomCode = null;
  let localStream = null;

  function login() {
    username = document.getElementById("username").value.trim();
    role = document.getElementById("role").value;

    if (!username) return alert("Please enter username");

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("platform").style.display = "block";
    document.getElementById("welcomeName").textContent = username;

    if (role === "teacher") {
      document.getElementById("teacherControls").style.display = "block";
    } else {
      // Student sees ongoing classes
      renderOngoingClasses();
    }
  }

  function showSignup() {
    alert("Sign Up coming soon! Use any username for demo.");
  }

  function startLesson() {
    const title = document.getElementById("lessonTitle").value.trim();
    if (!title) return alert("Please enter lesson title");

    socket.emit('create-room', { username, lessonTitle: title });
  }

  function renderOngoingClasses() {
    // For now using localStorage as fallback. Will improve with backend later
    const ongoing = loadOngoingClass();
    const grid = document.getElementById("ongoingGrid");
    grid.innerHTML = "";

    if (ongoing.length === 0) {
      grid.innerHTML = `<p>No ongoing classes yet. Teacher must start one.</p>`;
    } else {
      ongoing.forEach(cls => {
        const card = document.createElement("div");
        card.innerHTML = `
          <h3>${cls.title}</h3>
          <button onclick="joinClass('${cls.title}')">Join Class</button>
        `;
        grid.appendChild(card);
      });
    }
  }

  function joinClass(title) {
    roomCode = title.replace(/\s+/g, '-').toLowerCase();
    socket.emit('join-room', { username, roomCode });
    document.getElementById("platform").style.display = "none";
    document.getElementById("classroom").style.display = "block";
    document.getElementById("roomTitle").textContent = "Live: " + title;
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
      .then(stream => {
        localStream = stream;
        const video = document.createElement('video');
        video.autoplay = true;
        video.muted = true;
        video.srcObject = stream;
        document.getElementById("participants").appendChild(video);
      })
      .catch(err => alert("Camera error: " + err.message));
  }

  function sendMessage() {
    const msg = document.getElementById("chatInput").value.trim();
    if (!msg || !roomCode) return;
    socket.emit('chat', { roomCode, username, message: msg });
    document.getElementById("chatInput").value = "";
  }

  socket.on('chat', (data) => {
    const div = document.createElement('div');
    div.textContent = `${data.username}: ${data.message}`;
    document.getElementById("messages").appendChild(div);
  });

  function raiseHand() {
    if (roomCode) socket.emit('raise-hand', { roomCode, username });
  }

  function exitClass() {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    location.reload();
  }

  // Simple local storage fallback
  function loadOngoingClass() {
    const saved = localStorage.getItem('ongoingClass');
    return saved ? JSON.parse(saved) : [];
  }
</script>
</body>
</html>
