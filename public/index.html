<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Level Academy</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; background:#eef1f7; color:#333; }
  #loginPage {
    height:100vh; display:flex; justify-content:center; align-items:center;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                url('https://i.postimg.cc/jd0ZRMCV/next-level.jpg') center/cover no-repeat;
    color:white;
  }
  .login-box {
    background:rgba(255,255,255,0.92); color:#111; padding:50px 40px; border-radius:16px;
    text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .login-box input, .login-box select { padding:14px; margin:10px 0; width:100%; max-width:280px; border-radius:8px; }
  .signup-link { margin-top:15px; color:#2c3ea8; cursor:pointer; text-decoration:underline; }

  #classroom { display:none; padding:30px; background:#f8f9fc; }
  #participants { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; }
  .participant-wrapper { width:300px; text-align:center; }
  .participant-video { width:100%; border-radius:8px; border:3px solid #ccc; }
  .teacher-video { border-color:#2196f3; }
  .student-video { border-color:#4caf50; }
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <h2>Next Level Academy</h2>
    <input type="text" id="username" placeholder="Username"><br><br>
    <select id="role">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select><br><br>
    <button onclick="login()">Login</button>
    <div class="signup-link" onclick="showSignup()">Don't have an account? Sign Up</div>
  </div>
</div>

<div id="classroom">
  <h2 id="roomTitle">Live Classroom</h2>
  <div id="participants"></div>

  <div style="margin:20px 0;">
    <button onclick="startCamera()">Start My Camera</button>
    <button onclick="shareScreen()">Share Screen</button>
    <button onclick="raiseHand()">Raise Hand ✋</button>
    <button id="exitBtn" onclick="exitClass()">Leave Class</button>
  </div>

  <div id="chat">
    <div id="messages" style="height:200px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>
    <input id="chatInput" placeholder="Type message..." style="width:70%; padding:10px;">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>

<script>
  const socket = io(); // Connects to your Render backend

  let role = "", username = "", roomCode = null;
  let localStream = null;
  let peer = null;

  function login() {
    username = document.getElementById("username").value.trim();
    role = document.getElementById("role").value;

    if (!username) return alert("Enter username");

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("classroom").style.display = "block";

    if (role === "teacher") {
      const title = prompt("Enter Lesson Title:");
      if (title) socket.emit('create-room', { username, lessonTitle: title });
    } else {
      // Student waits for class to appear
      document.getElementById("roomTitle").textContent = "Waiting for ongoing class...";
    }
  }

  function showSignup() {
    alert("Sign Up coming soon! Use any username for demo.");
  }

  socket.on('room-created', (data) => {
    roomCode = data.roomCode;
    document.getElementById("roomTitle").textContent = `Room: ${data.lessonTitle}`;
    document.getElementById("exitBtn").textContent = "End Class";
    document.getElementById("exitBtn").className = "end-class";
  });

  socket.on('room-info', (data) => {
    roomCode = data.roomCode;
    document.getElementById("roomTitle").textContent = `Room: ${data.lessonTitle}`;
  });

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
      .then(stream => {
        localStream = stream;
        const video = document.createElement('video');
        video.autoplay = true;
        video.muted = true;
        video.srcObject = stream;
        document.getElementById("participants").appendChild(video);
      })
      .catch(err => alert("Camera error"));
  }

  function sendMessage() {
    const msg = document.getElementById("chatInput").value.trim();
    if (!msg || !roomCode) return;
    socket.emit('chat', { roomCode, username, message: msg });
    document.getElementById("chatInput").value = "";
  }

  socket.on('chat', (data) => {
    const div = document.createElement('div');
    div.textContent = `${data.username}: ${data.message}`;
    document.getElementById("messages").appendChild(div);
  });

  function raiseHand() {
    if (roomCode) socket.emit('raise-hand', { roomCode, username });
  }

  function exitClass() {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    location.reload();
  }

  // Auto refresh for student to see ongoing class
  setInterval(() => {
    if (role === "student") socket.emit('get-ongoing-classes');
  }, 3000);
</script>
</body>
</html>
